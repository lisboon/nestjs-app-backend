services:
  nestjs-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nestjs-backend
    command: /bin/sh -c "pnpm exec prisma migrate deploy && pnpm prisma:generate && pnpm start:dev"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3001"
      - "5555:5555"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://backend:backend@backend-db:5432/backend_db?schema=public
      - CORS_ORIGINS=http://localhost:3000
    env_file:
      - .env
    depends_on:
      backend-db:
        condition: service_healthy
    restart: unless-stopped

  backend-db:
    image: postgres:16-alpine
    container_name: backend-db
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: backend
      POSTGRES_DB: backend_db
    ports:
      - "5432:5432"
    volumes:
      - backend_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d backend_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  backend_db_data:
    driver: local
